<style>
  pre { position: relative; }
  .copy-btn {
    position: absolute;
    top: 0.4em;
    right: 0.5em;
    padding: 0.2em 0.55em;
    font-size: 0.72em;
    font-family: Segoe UI, Arial, sans-serif;
    color: #666;
    background: rgba(255,255,255,0.88);
    border: 1px solid #ccc;
    border-radius: 3px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    line-height: 1.5;
    user-select: none;
  }
  pre:hover .copy-btn { opacity: 1; }
  .copy-btn.copied { color: #2a7a2a; border-color: #aad4aa; background: rgba(240,250,240,0.9); }
  @media print { .copy-btn { display: none !important; } }
</style>
<script>
(function () {
  document.querySelectorAll('pre').forEach(function (pre) {
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.addEventListener('click', function () {
      var code = pre.querySelector('code') || pre;
      var text = code.innerText;
      function flash() {
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(function () { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(flash).catch(function () { fallback(text); flash(); });
      } else {
        fallback(text); flash();
      }
    });
    pre.appendChild(btn);
  });

  function fallback(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }
})();
</script>
