version: '3.8'

services:
  pandoc-sidecar:
    build: ./pandoc-sidecar
    container_name: pandoc-sidecar-work
    volumes:
      - ${DOCS_DIR:-.}/docs:/srv:ro
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy-md-work
    ports:
      - "8095:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DOCS_DIR:-.}/docs:/srv:ro
    depends_on:
      - pandoc-sidecar
    restart: unless-stopped
